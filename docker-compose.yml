version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dspmgmt_postgres
    environment:
      POSTGRES_USER: dspmgmt
      POSTGRES_PASSWORD: dspmgmt_secret
      POSTGRES_DB: dspmgmt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
